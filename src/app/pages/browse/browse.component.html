<section class="p-12">
  <h1 class="text-3xl font-bold text-center">Browse</h1>
  <p class="mt-4 text-center text-slate-600">Browse listings</p>

  <div *ngIf="loading" class="mt-8 text-center text-slate-500">
    Loading listings…
  </div>

  <div
    *ngIf="!loading && listings.length === 0"
    class="mt-8 text-center text-slate-500"
  >
    No listings yet.
  </div>

  <ul
    *ngIf="!loading && listings.length > 0"
    class="mt-10 space-y-4 max-w-2xl mx-auto"
  >
    <li
      *ngFor="let listing of listings"
      class="rounded-md border border-slate-200 p-4"
    >
      <h2 class="text-lg font-semibold text-slate-900">
        {{ listing.title }}
      </h2>

      <p class="mt-1 text-slate-700">
        ${{ listing.price }} • {{ listing.city }}
      </p>

      <p class="mt-1 text-sm text-slate-600">
        {{ listing.category.name }} • Posted
        {{ listing.createdAt | date: "mediumDate" }}
      </p>
    </li>
  </ul>
</section>
