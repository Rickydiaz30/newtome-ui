<section class="mx-auto max-w-5xl px-6 py-12">
  <h1 class="text-3xl font-bold text-slate-900">My Account</h1>

  <p class="mt-2 text-slate-600">Manage your listings and account settings.</p>

  <!-- Account summary -->
  <div class="mt-8 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-lg font-semibold text-slate-800">Account Info</h2>

    <div class="mt-4 space-y-2 text-sm text-slate-700">
      <p>
        <span class="font-medium">Name:</span>
        {{ user?.fullName || "—" }}
      </p>

      <p>
        <span class="font-medium">Email:</span>
        {{ user?.email || "—" }}
      </p>
    </div>
  </div>

  <!-- Actions -->
  <div class="mt-10 grid gap-4 sm:grid-cols-2">
    <a
      routerLink="/sell"
      class="flex items-center justify-center rounded-md bg-blue-950 px-6 py-4 text-sm font-semibold text-white transition hover:bg-blue-900"
    >
      Create a Listing
    </a>

    <button
      class="flex items-center justify-center rounded-md border border-slate-300 px-6 py-4 text-sm font-semibold text-slate-800 transition hover:bg-slate-100"
      (click)="logout()"
    >
      Log out
    </button>
  </div>
</section>
