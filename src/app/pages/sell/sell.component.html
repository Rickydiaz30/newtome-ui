<section class="bg-slate-50 px-6 py-16">
  <div class="mx-auto max-w-4xl">
    <div class="text-center">
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">
        Post a listing
      </h1>
      <p class="mt-4 text-base leading-relaxed text-slate-700">
        Fill out the details below. This will create a listing in the database.
      </p>
    </div>

    <div
      class="mt-10 rounded-xl border border-blue-950/20 bg-white p-6 shadow-sm sm:p-8"
    >
      <form class="space-y-10" (ngSubmit)="submit()" #listingForm="ngForm">
        <div>
          <h2 class="text-lg font-semibold text-slate-900">Listing details</h2>

          <div class="mt-4 grid gap-4 sm:grid-cols-2">
            <!-- Title -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700">Title</label>
              <input
                type="text"
                name="title"
                [(ngModel)]="model.title"
                required
                placeholder="e.g., Like-new Air Fryer (5qt)"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Category -->
            <div>
              <label class="text-sm font-medium text-slate-700">Category</label>
              <div class="relative mt-2">
                <select
                  name="categoryId"
                  [(ngModel)]="model.categoryId"
                  required
                  class="w-full appearance-none rounded-md border border-blue-950/25 bg-white px-4 py-3 pr-10 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
                >
                  <option [ngValue]="null">Select a category</option>
                  <option *ngIf="loadingCategories" disabled>Loading...</option>
                  <option *ngFor="let c of categories" [ngValue]="c.id">
                    {{ c.name }}
                  </option>
                </select>

                <span
                  class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500"
                >
                  ▾
                </span>
              </div>
            </div>

            <!-- Status -->
            <div>
              <label class="text-sm font-medium text-slate-700">Status</label>
              <div class="relative mt-2">
                <select
                  name="status"
                  [(ngModel)]="model.status"
                  required
                  class="w-full appearance-none rounded-md border border-blue-950/25 bg-white px-4 py-3 pr-10 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
                >
                  <option value="">Select status</option>
                  <option value="ACTIVE">Active</option>
                  <option value="DRAFT">Draft</option>
                  <option value="SOLD">Sold</option>
                </select>

                <span
                  class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-slate-500"
                >
                  ▾
                </span>
              </div>
            </div>

            <!-- Color -->
            <div>
              <label class="text-sm font-medium text-slate-700">Color</label>
              <input
                type="text"
                name="color"
                [(ngModel)]="model.color"
                placeholder="e.g., Black"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- City -->
            <div>
              <label class="text-sm font-medium text-slate-700">City</label>
              <input
                type="text"
                name="city"
                [(ngModel)]="model.city"
                required
                placeholder="e.g., Omaha"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Price -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700">Price</label>
              <div
                class="mt-2 flex rounded-md border border-blue-950/25 bg-white focus-within:ring-2 focus-within:ring-blue-950/15"
              >
                <span class="flex items-center px-3 text-slate-600">$</span>
                <input
                  type="number"
                  name="price"
                  [(ngModel)]="model.price"
                  required
                  min="0"
                  step="0.01"
                  inputmode="decimal"
                  placeholder="0.00"
                  class="w-full rounded-md px-4 py-3 text-slate-900 outline-none placeholder:text-slate-400"
                />
              </div>
            </div>

            <!-- Description -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700"
                >Description</label
              >
              <textarea
                rows="5"
                name="description"
                [(ngModel)]="model.description"
                required
                placeholder="What’s included? Any flaws?"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none placeholder:text-slate-400 focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              ></textarea>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div
          class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
        >
          <p class="text-xs text-slate-600">
            Created date will be set automatically when you publish.
          </p>

          <div class="flex gap-3">
            <button
              type="button"
              (click)="saveDraft()"
              class="rounded-md border border-blue-950/25 bg-white px-5 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-100"
            >
              Save draft
            </button>

            <button
              type="submit"
              [disabled]="listingForm.invalid"
              class="rounded-md bg-blue-950 px-5 py-3 text-sm font-semibold text-slate-50 shadow-sm transition hover:bg-blue-900 disabled:opacity-50"
            >
              Publish listing
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
