<section class="bg-slate-50 px-6 py-16">
  <div class="mx-auto max-w-3xl">
    <!-- Header -->
    <div class="text-center">
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">
        Create your new2me account
      </h1>
      <p class="mt-4 text-base leading-relaxed text-slate-700">
        Create an account to post listings and make real offers with confidence.
      </p>
    </div>

    <!-- Card -->
    <div
      class="mt-10 rounded-xl border border-blue-950/20 bg-white p-6 shadow-sm sm:p-8"
    >
      <form class="space-y-10" (ngSubmit)="submit()" #f="ngForm">
        <!-- Personal Info -->
        <div>
          <h2 class="text-lg font-semibold text-slate-900">Personal info</h2>

          <div class="mt-4 grid gap-4 sm:grid-cols-2">
            <!-- First name -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700"
                >First name</label
              >
              <input
                type="text"
                name="firstName"
                [(ngModel)]="model.firstName"
                required
                autocomplete="name"
                placeholder="Jane Doe"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Last name -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700"
                >Last name</label
              >
              <input
                type="text"
                name="lastName"
                [(ngModel)]="model.lastName"
                required
                autocomplete="name"
                placeholder="Jane Doe"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- User name -->
            <div class="sm:col-span-2">
              <label class="text-sm font-medium text-slate-700"
                >User name</label
              >
              <input
                type="text"
                name="username"
                [(ngModel)]="model.username"
                required
                autocomplete="name"
                placeholder="Jane Doe"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Phone -->
            <div>
              <label class="text-sm font-medium text-slate-700"
                >Phone (optional)</label
              >
              <input
                type="tel"
                name="phone"
                [(ngModel)]="model.phone"
                autocomplete="tel"
                placeholder="(555) 123-4567"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Email -->
            <div>
              <label class="text-sm font-medium text-slate-700">Email</label>
              <input
                type="email"
                name="email"
                [(ngModel)]="model.email"
                required
                autocomplete="email"
                placeholder="you@example.com"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Password -->
            <div>
              <label class="text-sm font-medium text-slate-700">Password</label>
              <input
                type="password"
                name="password"
                [(ngModel)]="model.password"
                required
                minlength="8"
                autocomplete="new-password"
                placeholder="At least 8 characters"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Confirm password -->
            <div>
              <label class="text-sm font-medium text-slate-700"
                >Confirm password</label
              >
              <input
                type="password"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                required
                autocomplete="new-password"
                placeholder="Re-enter password"
                class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 text-slate-900 outline-none focus:border-blue-950 focus:ring-2 focus:ring-blue-950/15"
              />
            </div>

            <!-- Password mismatch -->
            <p
              *ngIf="passwordMismatch"
              class="sm:col-span-2 text-sm text-red-600"
            >
              Passwords do not match.
            </p>
          </div>
        </div>

        <!-- Address (display-only for now) -->
        <div>
          <h2 class="text-lg font-semibold text-slate-900">Address</h2>
          <p class="mt-1 text-sm text-slate-600">
            Address details will be used later for receipts and verification.
          </p>

          <div class="mt-4 grid gap-4 sm:grid-cols-2">
            <input
              class="rounded-md border px-4 py-3"
              placeholder="Street address"
              disabled
            />
            <input
              class="rounded-md border px-4 py-3"
              placeholder="City"
              disabled
            />
            <input
              class="rounded-md border px-4 py-3"
              placeholder="State"
              disabled
            />
            <input
              class="rounded-md border px-4 py-3"
              placeholder="ZIP"
              disabled
            />
          </div>
        </div>

        <!-- Footer -->
        <div
          class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <p class="text-xs text-slate-600">
            By creating an account, you agree to our Terms and Privacy Policy.
          </p>

          <button
            type="submit"
            [disabled]="f.invalid || passwordMismatch || loading"
            class="inline-flex justify-center rounded-md bg-blue-950 px-6 py-3 text-sm font-semibold text-slate-50 transition hover:bg-blue-900 disabled:opacity-50"
          >
            {{ loading ? "Creating account…" : "Create account" }}
          </button>
        </div>

        <!-- Error -->
        <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>
      </form>
    </div>
  </div>
</section>
