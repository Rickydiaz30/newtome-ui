<section class="bg-slate-50 px-6 py-16">
  <div class="mx-auto max-w-md">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900">Login</h1>
    <p class="mt-2 text-slate-700">Access your account.</p>

    <div
      class="mt-8 rounded-xl border border-blue-950/20 bg-white p-6 shadow-sm"
    >
      <form class="space-y-5" (ngSubmit)="submit()" #f="ngForm">
        <div>
          <label class="text-sm font-medium text-slate-700">Username</label>
          <input
            type="text"
            name="username"
            [(ngModel)]="model.username"
            required
            class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-blue-950/15"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label class="text-sm font-medium text-slate-700">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="model.password"
            required
            class="mt-2 w-full rounded-md border border-blue-950/25 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-blue-950/15"
            placeholder="••••••••"
          />
        </div>

        <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>

        <button
          type="submit"
          [disabled]="f.invalid || loading"
          class="w-full rounded-md bg-blue-950 px-5 py-3 text-sm font-semibold text-slate-50 transition hover:bg-blue-900 disabled:opacity-50"
        >
          <app-spinner *ngIf="loading"></app-spinner>
          {{ loading ? "Logging in..." : "Login" }}
        </button>

        <p class="text-sm text-slate-600">
          Need an account?
          <a
            routerLink="/create-account"
            class="font-semibold text-blue-950 underline"
          >
            Create one
          </a>
        </p>
      </form>
    </div>
  </div>
</section>
