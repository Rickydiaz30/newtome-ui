<li
  (click)="listing.status === 'ACTIVE' && select.emit(listing)"
  [ngClass]="{
    'cursor-pointer': listing.status === 'ACTIVE',
    'opacity-70': listing.status !== 'ACTIVE',
  }"
  class="relative overflow-hidden rounded-lg bg-white shadow-sm hover:shadow-md transition duration-300 group"
>
  <!-- IMAGE + OVERLAY CONTAINER -->
  <div class="relative w-full aspect-[4/6] overflow-hidden">
    <!-- IMAGE -->
    <img
      [src]="getCurrentImage(listing)"
      (error)="onImageError($event)"
      class="w-full h-full object-contain transition duration-300 group-hover:scale-105"
    />

    <!-- LEFT ARROW -->
    <button
      *ngIf="(listing.imageUrls?.length || 0) > 1"
      (click)="prev($event, listing)"
      class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white w-8 h-8 flex items-center justify-center rounded-full transition z-10"
    >
      ◀
    </button>

    <!-- RIGHT ARROW -->
    <button
      *ngIf="(listing.imageUrls?.length || 0) > 1"
      (click)="next($event, listing)"
      class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/70 text-white w-8 h-8 flex items-center justify-center rounded-full transition z-10"
    >
      ▶
    </button>

    <!-- OVERLAY CONTENT -->
    <div
      class="absolute inset-x-0 bottom-0 p-3 bg-gradient-to-t from-black/90 via-black/70 to-transparent text-white"
    >
      <h2 class="text-sm md:text-base font-semibold flex items-center gap-2">
        {{ listing.title }}

        <span
          *ngIf="listing.status === 'ACTIVE'"
          class="text-[10px] md:text-xs bg-emerald-600 px-2 py-1 rounded"
        >
          ACTIVE
        </span>

        <span
          *ngIf="listing.status === 'SOLD'"
          class="text-[10px] md:text-xs bg-red-600 px-2 py-1 rounded"
        >
          SOLD
        </span>
      </h2>

      <p class="text-sm font-semibold mt-1">
        ${{ listing.price }} • {{ listing.city }}
      </p>

      <p class="text-[11px] text-slate-200">
        {{ listing.categoryName }} •
        {{ listing.createdAt | date: "mediumDate" }}
      </p>

      <p class="text-[11px] text-slate-300">
        Seller: {{ listing.ownerFirstName }}
      </p>
    </div>
  </div>
</li>
