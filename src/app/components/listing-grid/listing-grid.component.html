<ul
  *ngIf="listings.length > 0"
  class="mt-8 px-3 grid gap-4 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 max-w-7xl mx-auto"
>
  <!-- LISTING CARDS -->
  <app-listing-card
    *ngFor="let listing of listings"
    [listing]="listing"
    (select)="select.emit($event)"
  ></app-listing-card>
</ul>
