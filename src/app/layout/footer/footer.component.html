<footer class="bg-blue-950 px-6 py-16">
  <div class="mx-auto w-full max-w-6xl px-4">
    <div class="flex flex-col items-center text-center">
      <!-- Brand -->
      <h3 class="cursor-pointer font-bold text-slate-50">
        new<span class="text-sky-500">2</span>me
      </h3>

      <p class="mt-4 max-w-md text-sm text-slate-50">
        A modern marketplace for discovering and giving new life to gently used
        items. Thoughtful shopping, made simple. Period!
      </p>

      <!-- Footer Links -->
      <div
        class="cursor-pointer mt-8 flex flex-wrap justify-center gap-6 text-sm"
      >
        <a
          routerLink="/"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-slate-50 hover:underline"
        >
          Home
        </a>
        <a
          routerLink="/shop"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-slate-50 hover:underline"
        >
          Shop
        </a>
        <a
          routerLink="/sell"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-slate-50 hover:underline"
        >
          Sell
        </a>
        <a
          routerLink="/about"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-slate-50 hover:underline"
        >
          About
        </a>
      </div>

      <!-- Divider -->
      <div class="mt-10 h-px w-full bg-white/10"></div>

      <!-- Copyright -->
      <p class="mt-6 text-xs text-slate-50">
        © {{ currentYear }} new2me. All rights reserved.
      </p>
    </div>
  </div>
</footer>
