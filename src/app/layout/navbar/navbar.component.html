<nav
  class="sticky top-0 z-50 text-white transition-all duration-300"
  [class.bg-blue-950]="true"
  [class.bg-opacity-100]="!scrolled"
  [class.bg-opacity-80]="scrolled"
  data-nav
>
  <div class="mx-auto w-full max-w-6xl px-4">
    <div class="flex h-16 items-center justify-between">
      <!-- Brand -->
      <div
        routerLink="/"
        class="cursor-pointer font-bold tracking-wide hover:text-slate-300"
      >
        New <span class="text-sky-400 text-xl">2</span> Me

        <div *ngIf="loggedIn" class="mt-1 text-sm text-slate-100/90">
          <span class="text-sky-500">Hello, </span>
          <span class="font-semibold">{{ displayName }}</span>
        </div>
      </div>

      <!-- Desktop links -->
      <div class="hidden items-center gap-6 md:flex">
        <a
          routerLink="/"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300"
          (click)="closeAll()"
        >
          Home
        </a>

        <a
          routerLink="/shop"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300 transition-colors"
          (click)="closeAll()"
        >
          Shop
        </a>

        <a
          *ngIf="loggedIn"
          routerLink="/sell"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300"
          (click)="closeAll()"
        >
          Sell
        </a>

        <a
          routerLink="/about"
          routerLinkActive="!text-sky-400"
          (click)="closeAll()"
          class="hover:text-slate-300"
        >
          About
        </a>

        <!-- Logged out: show Login -->
        <a
          *ngIf="!loggedIn"
          routerLink="/login"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300"
          (click)="closeAll()"
        >
          Login
        </a>

        <!-- Logged in: show Hello, FirstName (far right-ish, before dropdown) -->
        <a
          *ngIf="loggedIn"
          routerLink="/account"
          class="cursor-pointer text-sm text-slate-100/90 hover:text-white"
          (click)="closeAll()"
        >
          <span class="text-sky-500">Hello,</span> {{ displayName }}
        </a>

        <a
          *ngIf="loggedIn"
          routerLink="/login"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300"
          (click)="logout(); closeAll()"
        >
          Logout
        </a>

        <a
          *ngIf="!loggedIn"
          routerLink="/create-account"
          routerLinkActive="!text-sky-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-slate-300"
          (click)="closeAll()"
        >
          Create Account
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button
        type="button"
        class="relative inline-flex h-10 w-10 items-center justify-center rounded-md hover:bg-slate-800 md:hidden"
        (click)="toggleMobile(); $event.stopPropagation()"
        aria-label="Open menu"
        [attr.aria-expanded]="mobileOpen"
      >
        <span class="sr-only">Open main menu</span>

        <!-- Top line -->
        <span
          class="absolute block h-0.5 w-6 bg-white transition-all duration-700 ease-in-out"
          [class.translate-y-0]="mobileOpen"
          [class.rotate-45]="mobileOpen"
          [class.-translate-y-2]="!mobileOpen"
          [class.rotate-0]="!mobileOpen"
        ></span>

        <!-- Middle line -->
        <span
          class="absolute block h-0.5 w-6 bg-white transition-all duration-700 ease-in-out"
          [class.opacity-0]="mobileOpen"
          [class.opacity-100]="!mobileOpen"
        ></span>

        <!-- Bottom line -->
        <span
          class="absolute block h-0.5 w-6 bg-white transition-all duration-700 ease-in-out"
          [class.translate-y-0]="mobileOpen"
          [class.-rotate-45]="mobileOpen"
          [class.translate-y-2]="!mobileOpen"
          [class.rotate-0]="!mobileOpen"
        ></span>
      </button>
    </div>

    <!-- Mobile panel -->
    <div
      class="absolute left-0 top-full z-50 w-full overflow-hidden md:hidden transition-all duration-700 ease-in-out transform"
      [class.max-h-0]="!mobileOpen"
      [class.max-h-[560px]]="mobileOpen"
      [class.opacity-0]="!mobileOpen"
      [class.opacity-100]="mobileOpen"
      [class.-translate-y-2]="!mobileOpen"
      [class.translate-y-0]="mobileOpen"
      (click)="$event.stopPropagation()"
    >
      <div class="mx-auto mt-2 max-w-6xl px-4 pb-4">
        <div
          class="space-y-1 rounded-lg bg-blue-950/95 p-2 shadow-lg ring-1 ring-black/10"
        >
          <a
            routerLink="/"
            (click)="closeAll()"
            class="block rounded-md px-3 py-2 hover:bg-blue-900"
            >Home</a
          >
          <a
            routerLink="/shop"
            (click)="closeAll()"
            class="block rounded-md px-3 py-2 hover:bg-blue-900"
            >Shop Now</a
          >

          <a
            *ngIf="!loggedIn"
            routerLink="/create-account"
            (click)="closeAll()"
            class="block rounded-md px-3 py-2 hover:bg-slate-700"
            >Create Account</a
          >

          <a
            *ngIf="loggedIn"
            routerLink="/sell"
            (click)="closeAll()"
            class="block rounded-md px-3 py-2 hover:bg-blue-900"
            >Sell</a
          >

          <!-- Auth links -->
          <ng-container *ngIf="!loggedIn; else mobileLoggedIn">
            <a
              routerLink="/login"
              (click)="closeAll()"
              class="block rounded-md px-3 py-2 hover:bg-blue-900"
              >Login</a
            >
          </ng-container>

          <ng-template #mobileLoggedIn>
            <a
              routerLink="/account"
              (click)="closeAll()"
              class="block rounded-md px-3 py-2 hover:bg-blue-900"
              >Account</a
            >
            <button
              type="button"
              class="block w-full rounded-md px-3 py-2 text-left hover:bg-blue-900"
              (click)="logout(); closeAll()"
            >
              Log out
            </button>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</nav>
